name: Terraform CI - Dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    shell: bash
    working-directory: bbr-dev-poc-cicd/Terra-prac/environments/dev/

# ==========================================================
# Terraform PLAN (no Azure auth)
# ==========================================================
jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform fmt -check || true
      - run: terraform init -backend=false
      - run: terraform validate -no-color
      - run: terraform plan -no-color

  # ==========================================================
  # Terraform APPLY (OIDC – only on push)
  # ==========================================================
  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform init -backend-config=../../global/backend/dev.backend.hcl
      - run: terraform apply -auto-approve -no-color