name: Terraform CI - Dev

on:
  pull_request:
    branches: [ main ]
    paths:
      - bbr-dev-poc-cicd/Terra-prac/environments/dev/**
  push:
    branches: [ main ]
    paths:
      - bbr-dev-poc-cicd/Terra-prac/environments/dev/**

defaults:
  run:
    shell: bash
    working-directory: bbr-dev-poc-cicd/Terra-prac/environments/dev/

# ==========================================================
# Terraform PLAN (PR – NO SECRETS)
# ==========================================================
jobs:
  terraform-plan:
    name: Terraform Plan (PR Validation)
    runs-on: ubuntu-latest

    #  NO Azure secrets here
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform fmt -check
        continue-on-error: true

      #  Init WITHOUT backend (no auth, no state)
      - run: terraform init -backend=false

      - run: terraform validate -no-color

      - run: terraform plan -no-color

  # ==========================================================
  # Terraform APPLY (Push to main – WITH OIDC)
  # ==========================================================
  terraform-apply:
    name: Terraform Apply (DEV)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: |
          terraform init \
            -backend-config=../../global/backend/dev.backend.hcl

      - run: terraform apply -auto-approve -no-color