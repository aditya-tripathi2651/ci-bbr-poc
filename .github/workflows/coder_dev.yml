name: Terraform CI - Dev

on:
  push:
    branches: [ main ]
    paths:
      - bbr-dev-poc-cicd/Terra-prac/environments/dev/**
  pull_request:
    branches: [ main ]
    paths:
      - bbr-dev-poc-cicd/Terra-prac/environments/dev/**
  workflow_dispatch:   # manual debugging trigger (keep this)

defaults:
  run:
    shell: bash
    working-directory: bbr-dev-poc-cicd/Terra-prac/environments/dev/

permissions:
  contents: read
  id-token: write   # required for OIDC

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - uses: actions/checkout@v4

      # -------------------------
      # Terraform setup
      # -------------------------
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      # -------------------------
      # Formatting (non-blocking)
      # -------------------------
      - run: terraform fmt -check || true

      # -------------------------
      # INIT (Plan – no Azure env, no secrets)
      # -------------------------
      - name: Terraform Init (PLAN)
        if: github.event_name == 'pull_request'
        run: |
          terraform init \
            -backend-config=../../global/backend/dev.backend.hcl \
            -reconfigure

      # -------------------------
      # PLAN
      # -------------------------
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      # -------------------------
      # INIT (Apply – WITH Azure OIDC env)
      # -------------------------
      - name: Terraform Init (APPLY)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config=../../global/backend/dev.backend.hcl \
            -reconfigure

      # -------------------------
      # APPLY
      # -------------------------
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -auto-approve -no-color