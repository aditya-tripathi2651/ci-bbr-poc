name: Terraform CI - Dev

on:
  pull_request:
    branches: [ main ]
    paths:
      - bbr-dev-poc-cicd/Terra-prac/environments/dev/**
  push:
    branches: [ main ]
    paths:
      - bbr-dev-poc-cicd/Terra-prac/environments/dev/**
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: bbr-dev-poc-cicd/Terra-prac/environments/dev/

permissions:
  contents: read
  id-token: write

jobs:
  # ==========================================================
  # PLAN (NO AZURE, NO BACKEND)
  # ==========================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform fmt -check || true

      # ✅ IMPORTANT: disable backend entirely
      - name: Terraform Init (No backend)
        run: terraform init -backend=false

      - run: terraform validate -no-color

      - run: terraform plan -no-color

  # ==========================================================
  # APPLY (AZURE OIDC + BACKEND)
  # ==========================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Init (Azure backend)
        run: |
          terraform init \
            -backend-config=../../global/backend/dev.backend.hcl \
            -reconfigure

      - run: terraform apply -auto-approve -no-color